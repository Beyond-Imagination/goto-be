spring:
  config:
    activate:
      on-profile: local-test
  datasource:
    url: jdbc:postgresql://localhost:5433/goto_test
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    clean-disabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  cloud:
    aws:
      parameterstore:
        enabled: false
      region:
        static: ap-northeast-2
      credentials:
        use-default-aws-credentials-chain: false

tour-api:
  base-url: "http://apis.data.go.kr/B551011/KorWithService2"
  service-key: "${TOUR_API_SERVICE_KEY:test-service-key}"
  mobile-os: "ETC"
  mobile-app: "Goto"

security:
  jwt:
    issuer: goto-test
    secret: test-secret-key-must-be-at-least-32-bytes-long
    access-token-ttl: 5m
    refresh-token-ttl: 30m
