import org.apache.tools.ant.taskdefs.condition.Os

// Caller must set settings.ext.hooksProjectDir to the backend git root.
def hooksProjectDir = settings.ext.hooksProjectDir as File
def hooksDir = new File(hooksProjectDir, '.githooks')

if (!hooksDir.isDirectory()) {
  return
}

try {
  providers.exec {
    workingDir = hooksProjectDir
    commandLine 'git', 'config', 'core.hooksPath', '.githooks'
  }.result.get()

  if (!Os.isFamily(Os.FAMILY_WINDOWS)) {
    def needs_chmod_fallback = false

    hooksDir.eachFile { file ->
      if (file.isFile() && !file.setExecutable(true, false)) {
        needs_chmod_fallback = true
      }
    }

    if (needs_chmod_fallback) {
      logger.warn('[Gradle Init] setExecutable failed; falling back to chmod')
      providers.exec {
        workingDir = hooksDir
        commandLine 'chmod', '-R', '+x', '.'
      }.result.get()
    }
  }
} catch (Exception e) {
  logger.warn("[Gradle Init] Git Hooks setup warning: ${e.message}")
}
